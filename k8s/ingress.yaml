# =============================================================================
# Kubernetes Ingress Configuration
# =============================================================================

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: production
  labels:
    app: app
    tier: frontend
  annotations:
    # NGINX Ingress Controller annotations
    kubernetes.io/ingress.class: "nginx"
    
    # SSL Configuration
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    
    # Rewrite rules for API paths
    nginx.ingress.kubernetes.io/rewrite-target: /
    
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "50"
    
    # Proxy settings
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    
    # CORS configuration
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://example.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "PUT, GET, POST, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization,Content-Type,Accept,Origin,User-Agent,Cache-Control,Keep-Alive,X-Requested-With"
    
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Content-Security-Policy: default-src 'self'";
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains";
    
    # WebSocket support
    nginx.ingress.kubernetes.io/use-regex: "true"
    
    # Canary annotations (for canary deployments)
    # nginx.ingress.kubernetes.io/canary: "true"
    # nginx.ingress.kubernetes.io/canary-weight: "5"

spec:
  ingressClassName: nginx
  
  tls:
    - hosts:
        - example.com
        - www.example.com
      secretName: app-tls-secret
  
  rules:
    - host: example.com
      http:
        paths:
          # API routes
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: app-svc
                port:
                  number: 80
            middlewares:
              - name: app-rate-limit
                namespace: production

          # WebSocket routes
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: app-svc
                port:
                  number: 80

          # Static assets
          - path: /static
            pathType: Prefix
            backend:
              service:
                name: app-svc
                port:
                  number: 80

          # Default catch-all
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app-svc
                port:
                  number: 80

---
# Ingress for Staging Environment
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-staging-ingress
  namespace: staging
  labels:
    app: app
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-staging"

spec:
  ingressClassName: nginx
  
  tls:
    - hosts:
        - staging.example.com
      secretName: app-staging-tls-secret
  
  rules:
    - host: staging.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app-svc
                port:
                  number: 80
