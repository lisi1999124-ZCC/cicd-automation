# =============================================================================
# Kubernetes ConfigMaps
# =============================================================================

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: production
  labels:
    app: app
    tier: frontend
data:
  # Application settings
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  PORT: "8080"
  
  # API Configuration
  API_TIMEOUT: "30000"
  API_RETRIES: "3"
  
  # Database settings
  DB_POOL_MIN: "2"
  DB_POOL_MAX: "10"
  DB_POOL_IDLE_TIMEOUT: "10000"
  DB_STATEMENT_TIMEOUT: "30000"
  
  # Redis settings
  REDIS_MAX_RETRIES: "3"
  REDIS_RETRY_DELAY: "1000"
  CACHE_TTL: "3600"
  
  # CORS settings
  CORS_ORIGIN: "https://example.com,https://www.example.com"
  
  # Feature flags
  ENABLE_SWAGGER: "false"
  ENABLE_METRICS: "true"
  ENABLE_TRACING: "true"
  
  # Rate limiting
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX_REQUESTS: "100"

---
# ConfigMap for Staging
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: staging
  labels:
    app: app
data:
  NODE_ENV: "staging"
  LOG_LEVEL: "debug"
  PORT: "8080"
  API_TIMEOUT: "60000"
  DB_POOL_MIN: "1"
  DB_POOL_MAX: "5"
  REDIS_MAX_RETRIES: "5"
  CACHE_TTL: "300"
  CORS_ORIGIN: "*"
  ENABLE_SWAGGER: "true"
  ENABLE_METRICS: "true"
  ENABLE_TRACING: "true"
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX_REQUESTS: "1000"

---
# =============================================================================
# Kubernetes Secrets (Encrypted with Sealed Secrets or external secret manager)
# =============================================================================

---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: production
  labels:
    app: app
type: Opaque
stringData:
  # Database credentials
  DATABASE_URL: "postgres://app_user:REPLACE_WITH_REAL_PASSWORD@postgres.production.svc.cluster.local:5432/app_db"
  
  # Redis password
  REDIS_PASSWORD: "REPLACE_WITH_REAL_PASSWORD"
  
  # JWT secrets
  JWT_SECRET: "REPLACE_WITH_REAL_JWT_SECRET_32_CHARS"
  JWT_EXPIRY: "24h"
  
  # API keys
  API_KEY: "REPLACE_WITH_REAL_API_KEY"
  SENDGRID_API_KEY: "REPLACE_WITH_REAL_SENDGRID_KEY"
  
  # AWS credentials
  AWS_ACCESS_KEY_ID: "REPLACE_WITH_REAL_KEY_ID"
  AWS_SECRET_ACCESS_KEY: "REPLACE_WITH_REAL_SECRET"
  AWS_REGION: "us-east-1"
  
  # Sentry DSN for error tracking
  SENTRY_DSN: "https://xxx@sentry.io/xxx"
  
  # External services
  EXTERNAL_API_URL: "https://api.external.com"
  EXTERNAL_API_KEY: "REPLACE_WITH_REAL_KEY"

---
# Secrets for Staging
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: staging
type: Opaque
stringData:
  DATABASE_URL: "postgres://staging_user:staging_password@postgres.staging.svc.cluster.local:5432/app_staging"
  REDIS_PASSWORD: "staging_redis_password"
  JWT_SECRET: "staging_jwt_secret_change_me"
  JWT_EXPIRY: "7d"
  API_KEY: "staging_api_key"
  SENTRY_DSN: ""

---
# =============================================================================
# Network Policies
# =============================================================================

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: app-network-policy
  namespace: production
spec:
  podSelector:
    matchLabels:
      app: app
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
    # Allow traffic from monitoring (Prometheus)
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 9090
  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
    # Allow external HTTPS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
    # Allow PostgreSQL
    - to:
        - namespaceSelector:
            matchLabels:
              name: database
      ports:
        - protocol: TCP
          port: 5432
    # Allow Redis
    - to:
        - namespaceSelector:
            matchLabels:
              name: cache
      ports:
        - protocol: TCP
          port: 6379
