# =============================================================================
# Kubernetes Service Configuration
# =============================================================================

---
# Service for Green Environment (Production)
apiVersion: v1
kind: Service
metadata:
  name: app-svc
  namespace: production
  labels:
    app: app
    tier: frontend
  annotations:
    # AWS ALB annotations for Application Load Balancer
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:us-east-1:123456789:certificate/abc123"
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
    service.beta.kubernetes.io/aws-load-balancer-connection-idle-timeout: "60"
    # Enable access logs
    service.beta.kubernetes.io/aws-load-balancer-access-log-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-access-log-emit-interval: "5"
spec:
  type: LoadBalancer
  selector:
    app: app
    # Initial selector - will be patched to switch between green and blue
    slot: green
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: https
      port: 443
      targetPort: http
      protocol: TCP
  sessionAffinity: None
  externalTrafficPolicy: Cluster
  healthCheckNodePort: 0

---
# Headless service for internal communication
apiVersion: v1
kind: Service
metadata:
  name: app-internal
  namespace: production
  labels:
    app: app
    tier: backend
spec:
  type: ClusterIP
  selector:
    app: app
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  clusterIP: None

---
# Service for Blue Environment (Standby)
apiVersion: v1
kind: Service
metadata:
  name: app-blue-svc
  namespace: production
  labels:
    app: app
    slot: blue
spec:
  type: ClusterIP
  selector:
    app: app
    slot: blue
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
