# =============================================================================
# Prometheus Configuration
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'production'
    environment: 'prod'
  
  # Alertmanager configuration
  alerting:
    alertmanagers:
      - static_configs:
          - targets:
              - alertmanager.monitoring.svc.cluster.local:9093

# Rule files for alerting and recording
rule_files:
  - '/etc/prometheus/rules/*.yml'

# Remote write configuration (for long-term storage)
remote_write:
  - url: https://prometheus-us.grafana.com/api/prom/push
    basic_auth:
      username: 'user'
      password: 'password'
    queue_config:
      max_samples_per_send: 10000
      batch_send_deadline: 30s

# Scrape configurations
scrape_configs:
  # ─────────────────────────────────────────────────────────────────────────
  # Prometheus Self-Monitoring
  # ─────────────────────────────────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # ─────────────────────────────────────────────────────────────────────────
  # Kubernetes API Server
  # ─────────────────────────────────────────────────────────────────────────
  - job_name: 'kubernetes-apiservers'
    kubernetes_sd_configs:
      - role: endpoints
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
        action: keep
        regex: default;kubernetes;https

  # ─────────────────────────────────────────────────────────────────────────
  # Kubernetes Nodes
  # ─────────────────────────────────────────────────────────────────────────
  - job_name: 'kubernetes-nodes'
    kubernetes_sd_configs:
      - role: node
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)

  # ─────────────────────────────────────────────────────────────────────────
  # Kubernetes Pods (Auto-discovery)
  # ─────────────────────────────────────────────────────────────────────────
  - job_name: 'kubernetes-pods'
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      # Only scrape pods with prometheus.io/scrape annotation
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      
      # Get the port from annotation
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
        target_label: __param_port
        replacement: ${1}
      
      # Get the path from annotation (default to /metrics)
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        target_label: __metrics_path__
        replacement: ${1}
        regex: (.+)
      
      # Target label for service name
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      
      # Namespace label
      - source_labels: [__meta_kubernetes_namespace]
        target_label: kubernetes_namespace
      
      # Pod name label
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: kubernetes_pod_name

  # ─────────────────────────────────────────────────────────────────────────
  # Application Metrics
  # ─────────────────────────────────────────────────────────────────────────
  - job_name: 'application'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - production
            - staging
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: app
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
        target_label: __param_port
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
    metrics_path: /metrics
    scrape_interval: 10s

  # ─────────────────────────────────────────────────────────────────────────
  # NGINX Ingress Controller
  # ─────────────────────────────────────────────────────────────────────────
  - job_name: 'nginx-ingress'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - ingress-nginx
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_container_name]
        action: keep
        regex: controller
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
    metrics_path: /metrics

  # ─────────────────────────────────────────────────────────────────────────
  # Blackbox Exporter (for endpoint monitoring)
  # ─────────────────────────────────────────────────────────────────────────
  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://example.com/health
          - https://staging.example.com/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter.monitoring.svc.cluster.local:9115

  # ─────────────────────────────────────────────────────────────────────────
  # Redis Exporter
  # ─────────────────────────────────────────────────────────────────────────
  - job_name: 'redis'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - production
            - staging
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: redis
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
    metrics_path: /metrics
