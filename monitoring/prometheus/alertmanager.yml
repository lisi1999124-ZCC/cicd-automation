# =============================================================================
# AlertManager Configuration
# =============================================================================

global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'alerts@example.com'
  smtp_auth_username: 'alerts@example.com'
  smtp_auth_password: '${SMTP_PASSWORD}'
  
  slack_api_url: '${SLACK_WEBHOOK_URL}'
  slack_channel: '#alerts'
  slack_username: 'AlertManager'
  slack_icon_emoji: ':warning:'

# Files to load templates from
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Route tree
route:
  group_by: ['alertname', 'namespace', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: critical-alerts
      continue: true
      routes:
        - match:
            team: database
          receiver: database-team
        - match:
            team: backend
          receiver: backend-team
        - match:
            team: platform
          receiver: platform-team

    # Warning alerts - less urgent
    - match:
        severity: warning
      receiver: warning-alerts
      group_wait: 2m
      group_interval: 10m

    # SLO alerts
    - match:
        alertname: .*SLO.*
      receiver: slo-alerts
      group_wait: 1m
      repeat_interval: 1h

# Define receivers
receivers:
  # Default receiver (email)
  - name: 'default'
    email_configs:
      - to: 'oncall@example.com'
        send_resolved: true
        headers:
          subject: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }} - {{ .CommonLabels.namespace }}'

  # Critical alerts receiver
  - name: 'critical-alerts'
    slack_configs:
      - channel: '#alerts-critical'
        send_resolved: true
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
        title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Labels.alertname }}
          *Severity:* {{ .Labels.severity }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Namespace:* {{ .Labels.namespace }}
          *Service:* {{ .Labels.service }}
          *Runbook:* {{ .Annotations.runbook_url }}
          {{ if .Annotations.dashboard }}
          *Dashboard:* {{ .Annotations.dashboard }}
          {{ end }}
          {{ end }}
        actions:
          - type: button
            text: 'Runbook'
            url: '{{ .Alerts.0.Annotations.runbook_url }}'
          - type: button
            text: 'Silence'
            url: '{{ .GeneratorURL }}'
    pagerduty_configs:
      - service_key: '${PAGERDUTY_KEY}'
        severity: critical
        send_resolved: true
        details:
          summary: '{{ .Alerts.0.Annotations.summary }}'
          description: '{{ .Alerts.0.Annotations.description }}'
          namespace: '{{ .Alerts.0.Labels.namespace }}'
          service: '{{ .Alerts.0.Labels.service }}'
    email_configs:
      - to: 'oncall@example.com,pagerduty@example.com'
        send_resolved: true
        headers:
          subject: '[CRITICAL] {{ .Alerts.0.Annotations.summary }}'
        html: |
          <h1>Critical Alert</h1>
          <p><strong>Alert:</strong> {{ .Alerts.0.Labels.alertname }}</p>
          <p><strong>Severity:</strong> {{ .Alerts.0.Labels.severity }}</p>
          <p><strong>Summary:</strong> {{ .Alerts.0.Annotations.summary }}</p>
          <p><strong>Description:</strong> {{ .Alerts.0.Annotations.description }}</p>
          <p><a href="{{ .Alerts.0.Annotations.runbook_url }}">View Runbook</a></p>

  # Warning alerts receiver
  - name: 'warning-alerts'
    slack_configs:
      - channel: '#alerts-warning'
        send_resolved: true
        color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'
        title: '[WARNING] {{ .GroupLabels.alertname }}'
        text: |
          *Alert:* {{ .Alerts.0.Labels.alertname }}
          *Summary:* {{ .Alerts.0.Annotations.summary }}
          *Namespace:* {{ .Alerts.0.Labels.namespace }}

  # SLO alerts receiver
  - name: 'slo-alerts'
    slack_configs:
      - channel: '#slo-alerts'
        send_resolved: true
        color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'
        title: '[SLO] {{ .GroupLabels.alertname }}'
        text: |
          Service Level Objective at risk!
          *Alert:* {{ .Alerts.0.Labels.alertname }}
          *Service:* {{ .Alerts.0.Labels.service }}

  # Team-specific receivers
  - name: 'database-team'
    slack_configs:
      - channel: '#team-database'
        send_resolved: true
        title: '[DATABASE] {{ .Alerts.0.Annotations.summary }}'
    email_configs:
      - to: 'database-team@example.com'
        send_resolved: true

  - name: 'backend-team'
    slack_configs:
      - channel: '#team-backend'
        send_resolved: true
        title: '[BACKEND] {{ .Alerts.0.Annotations.summary }}'
    email_configs:
      - to: 'backend-team@example.com'
        send_resolved: true

  - name: 'platform-team'
    slack_configs:
      - channel: '#team-platform'
        send_resolved: true
        title: '[PLATFORM] {{ .Alerts.0.Annotations.summary }}'
    email_configs:
      - to: 'platform-team@example.com'
        send_resolved: true

# Inhibition rules
inhibit_rules:
  # Suppress warnings when critical is firing for same alert
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal:
      - 'alertname'
      - 'namespace'
      - 'service'

  # Suppress less severe alerts when the same instance is down
  - source_match:
      alertname: 'InstanceDown'
    target_match_re:
      alertname: '.*'
    equal:
      - 'instance'
